<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico" />
    <title>Rugano - Door Simulator</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Inter", sans-serif;
        background: #0f1117;
        color: #e2e8f0;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
      }
      .container {
        width: 100%;
        max-width: 400px;
      }
      .logo {
        text-align: center;
        margin-bottom: 24px;
      }
      .logo img {
        width: 48px;
        height: 42px;
        object-fit: contain;
        margin-bottom: 8px;
      }
      .logo h1 {
        font-size: 20px;
        font-weight: 700;
        color: #4ade80;
        letter-spacing: 3px;
      }
      .logo p {
        font-size: 11px;
        color: #64748b;
        letter-spacing: 2px;
        margin-top: 4px;
      }

      .door-device {
        background: #1a1d2e;
        border: 2px solid #2d3748;
        border-radius: 20px;
        padding: 24px;
        box-shadow: 0 0 40px rgba(0, 0, 0, 0.5);
      }
      .door-status {
        text-align: center;
        padding: 18px;
        border-radius: 12px;
        margin-bottom: 20px;
        background: #0f1117;
        border: 1px solid #2d3748;
        transition: all 0.4s;
      }
      .door-status .icon {
        font-size: 42px;
        margin-bottom: 6px;
      }
      .door-status .status-text {
        font-size: 20px;
        font-weight: 700;
        letter-spacing: 2px;
      }
      .door-status .status-sub {
        font-size: 12px;
        color: #64748b;
        margin-top: 6px;
        line-height: 1.5;
      }
      .door-status.granted {
        border-color: #4ade80;
        background: rgba(74, 222, 128, 0.05);
      }
      .door-status.granted .status-text {
        color: #4ade80;
      }
      .door-status.denied {
        border-color: #f87171;
        background: rgba(248, 113, 113, 0.05);
      }
      .door-status.denied .status-text {
        color: #f87171;
      }

      .form-group {
        margin-bottom: 14px;
      }
      .form-group label {
        display: block;
        font-size: 12px;
        color: #64748b;
        margin-bottom: 6px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }
      .form-group select {
        width: 100%;
        padding: 11px 14px;
        background: #0f1117;
        border: 1px solid #2d3748;
        border-radius: 8px;
        color: #e2e8f0;
        font-size: 14px;
        outline: none;
        font-family: "Inter", sans-serif;
        transition: border-color 0.2s;
      }
      .form-group select:focus {
        border-color: #4ade80;
      }

      .keypad {
        margin: 16px 0;
      }
      .keypad-display {
        background: #0f1117;
        border: 1px solid #2d3748;
        border-radius: 8px;
        padding: 10px 16px;
        font-size: 22px;
        letter-spacing: 8px;
        text-align: center;
        color: #4ade80;
        margin-bottom: 12px;
        min-height: 48px;
        font-family: monospace;
      }
      .keypad-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
      }
      .key {
        padding: 15px;
        background: #0f1117;
        border: 1px solid #2d3748;
        border-radius: 10px;
        font-size: 18px;
        font-weight: 600;
        color: #f1f5f9;
        cursor: pointer;
        text-align: center;
        transition: all 0.15s;
        user-select: none;
        -webkit-tap-highlight-color: transparent;
      }
      .key:hover {
        background: #2d3748;
        border-color: #4ade80;
        color: #4ade80;
      }
      .key:active {
        transform: scale(0.93);
        background: #2d3748;
      }
      .key.clear {
        color: #f87171;
        border-color: rgba(248, 113, 113, 0.3);
      }
      .key.clear:hover {
        background: rgba(248, 113, 113, 0.1);
        border-color: #f87171;
      }
      .key.enter {
        background: #4ade80;
        color: #0f1117;
        border-color: #4ade80;
        font-size: 13px;
        font-weight: 700;
      }
      .key.enter:hover {
        background: #22c55e;
      }
      .key.enter:active {
        background: #16a34a;
      }

      .admin-link {
        text-align: center;
        margin-top: 20px;
        font-size: 12px;
        color: #374151;
      }
      .admin-link a {
        color: #4a5568;
        text-decoration: none;
      }
      .admin-link a:hover {
        color: #4ade80;
      }

      .loading .icon {
        animation: pulse 1s infinite;
      }
      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }

      @media (max-width: 480px) {
        body {
          padding: 16px;
          align-items: flex-start;
          padding-top: 24px;
        }
        .door-device {
          padding: 18px;
        }
        .key {
          padding: 14px;
          font-size: 17px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">
        <img src="/static/images/rugano-logo.jpg" alt="Rugano" />
        <h1>RUGANO</h1>
        <p>Smart Door Lock</p>
      </div>
      <div class="door-device">
        <div class="door-status" id="statusBox">
          <div class="icon">🚪</div>
          <div class="status-text" id="statusText">READY</div>
          <div class="status-sub" id="statusSub">Select unit and enter PIN</div>
        </div>
        <div class="form-group">
          <label>Unit</label>
          <select id="unitSelect" onchange="resetStatus()">
            <option value="">Select your unit...</option>
            {% for unit in units %}
            <option value="{{ unit.unit_number }}">
              Unit {{ unit.unit_number }}
            </option>
            {% endfor %}
          </select>
        </div>
        <div class="keypad">
          <div class="keypad-display"><span id="pinDots"></span></div>
          <div class="keypad-grid">
            <div class="key" onclick="pressKey('1')">1</div>
            <div class="key" onclick="pressKey('2')">2</div>
            <div class="key" onclick="pressKey('3')">3</div>
            <div class="key" onclick="pressKey('4')">4</div>
            <div class="key" onclick="pressKey('5')">5</div>
            <div class="key" onclick="pressKey('6')">6</div>
            <div class="key" onclick="pressKey('7')">7</div>
            <div class="key" onclick="pressKey('8')">8</div>
            <div class="key" onclick="pressKey('9')">9</div>
            <div class="key clear" onclick="clearPin()">⌫</div>
            <div class="key" onclick="pressKey('0')">0</div>
            <div class="key enter" onclick="submitPin()">ENTER</div>
          </div>
        </div>
      </div>
      <div class="admin-link">
        <a href="/admin/dashboard">← Admin Dashboard</a>
      </div>
    </div>
    <script>
      let pin = "";
      const MAX_PIN = 8;
      function pressKey(d) {
        if (pin.length >= MAX_PIN) return;
        pin += d;
        updateDisplay();
        resetStatus();
      }
      function clearPin() {
        pin = pin.slice(0, -1);
        updateDisplay();
      }
      function updateDisplay() {
        document.getElementById("pinDots").textContent =
          "●".repeat(pin.length) || "";
      }
      function resetStatus() {
        const box = document.getElementById("statusBox");
        box.className = "door-status";
        document.getElementById("statusText").textContent = "READY";
        document.getElementById("statusSub").textContent =
          "Select unit and enter PIN";
        document.querySelector("#statusBox .icon").textContent = "🚪";
      }
      async function submitPin() {
        const unit = document.getElementById("unitSelect").value;
        if (!unit) {
          showStatus(
            "denied",
            "⚠️",
            "SELECT UNIT",
            "Please select your unit first.",
          );
          return;
        }
        if (pin.length < 6) {
          showStatus(
            "denied",
            "⚠️",
            "TOO SHORT",
            "PIN must be at least 6 digits.",
          );
          return;
        }
        showStatus("loading", "⏳", "CHECKING...", "Please wait...");
        try {
          const res = await fetch("/door/check", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ unit_number: unit, pin: pin }),
          });
          const data = await res.json();
          if (data.access === "granted") {
            showStatus(
              "granted",
              "🔓",
              "ACCESS GRANTED",
              `Welcome ${data.tenant_name}!\nValid until: ${data.expires}\n${data.days_remaining} day(s) remaining`,
            );
          } else {
            showStatus(
              "denied",
              "🔒",
              "ACCESS DENIED",
              data.reason || "Access not permitted.",
            );
          }
        } catch (e) {
          showStatus("denied", "❌", "ERROR", "Connection error. Try again.");
        }
        pin = "";
        updateDisplay();
        setTimeout(resetStatus, 4000);
      }
      function showStatus(type, icon, text, sub) {
        const box = document.getElementById("statusBox");
        box.className = `door-status ${type}`;
        document.querySelector("#statusBox .icon").textContent = icon;
        document.getElementById("statusText").textContent = text;
        document.getElementById("statusSub").textContent = sub;
      }
      document.addEventListener("keydown", (e) => {
        if (e.key >= "0" && e.key <= "9") pressKey(e.key);
        else if (e.key === "Backspace") clearPin();
        else if (e.key === "Enter") submitPin();
      });
    </script>
  </body>
</html>
